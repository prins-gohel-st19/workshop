<!-- 
    Task 1: Greetings Counter

Use a closure to count how many times a user is greeted and a callback to display the greeting message.-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        function greet() {
    let count = 1;

    return function () {
        console.log(`hello ${count}`);
        count++;
    };
}
let g = greet();
console.log(g());
console.log(g());
console.log(g());



    </script>
</body>
</html>
